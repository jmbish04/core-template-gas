name: Deploy Affected Apps Script Projects (v2)

on:
  push:
    branches: ['master']
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  detect:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.detect.outputs.projects }}
      has_projects: ${{ steps.detect.outputs.has_projects }}
      has_secrets: ${{ steps.check_secrets.outputs.has_secrets }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Determine Git Refs
        id: refs
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "base=origin/${{ github.base_ref }}" >> $GITHUB_OUTPUT
            echo "head=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          else
            echo "base=${{ github.event.before }}" >> $GITHUB_OUTPUT
            echo "head=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - id: detect
        run: node scripts/affected-projects.mjs --github-output --base ${{ steps.refs.outputs.base }} --head ${{ steps.refs.outputs.head }}

      - name: Check for Clasp Secrets
        id: check_secrets
        env:
          CLASP_CREDENTIALS_JSON: ${{ secrets.CLASP_CREDENTIALS_JSON }}
          CLASP_PROJECTS_JSON: ${{ secrets.CLASP_PROJECTS_JSON }}
        run: |
          if [ -n "$CLASP_CREDENTIALS_JSON" ] && [ -n "$CLASP_PROJECTS_JSON" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: detect
    if: needs.detect.outputs.has_projects == 'true' && needs.detect.outputs.has_secrets == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect.outputs.projects) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Configure clasp credentials
        env:
          CLASP_CREDENTIALS_JSON: ${{ secrets.CLASP_CREDENTIALS_JSON }}
        run: |
          mkdir -p "$HOME"
          printf '%s' "$CLASP_CREDENTIALS_JSON" > "$HOME/.clasprc.json"

      - name: Deploy affected project
        env:
          CLASP_PROJECTS_JSON: ${{ secrets.CLASP_PROJECTS_JSON }}
        run: node scripts/deploy-project.mjs --project ${{ matrix.project }}
