name: Deploy Affected Apps Script Projects

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  detect:
    if: github.event_name != 'pull_request' || (github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.detect.outputs.projects }}
      has_projects: ${{ steps.detect.outputs.has_projects }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_REF: ${{ github.base_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            node scripts/affected-projects.mjs --github-output --base "origin/$PR_BASE_REF" --head "$PR_HEAD_SHA"
          elif [[ "$EVENT_NAME" == "push" && "$PUSH_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            node scripts/affected-projects.mjs --github-output --base "$PUSH_BEFORE_SHA" --head "$PUSH_HEAD_SHA"
          else
            node scripts/affected-projects.mjs --github-output --base HEAD~1 --head HEAD
          fi

  deploy:
    needs: detect
    if: needs.detect.outputs.has_projects == 'true' && secrets.CLASP_CREDENTIALS_JSON != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect.outputs.projects) }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Configure clasp credentials
        env:
          CLASP_CREDENTIALS_JSON: ${{ secrets.CLASP_CREDENTIALS_JSON }}
        run: |
          mkdir -p "$HOME"
          printf '%s' "$CLASP_CREDENTIALS_JSON" > "$HOME/.clasprc.json"

      - name: Deploy affected project
        env:
          CLASP_PROJECTS_JSON: ${{ secrets.CLASP_PROJECTS_JSON }}
          APPS_SCRIPT_PROPERTIES_JSON: ${{ secrets.APPS_SCRIPT_PROPERTIES_JSON }}
        run: node scripts/deploy-project.mjs --project ${{ matrix.project }}
