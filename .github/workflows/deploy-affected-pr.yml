name: Deploy Affected Apps Script Projects

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  detect:
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.detect.outputs.projects }}
      has_projects: ${{ steps.detect.outputs.has_projects }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - id: detect
        run: node scripts/affected-projects.mjs --github-output --base origin/${{ github.base_ref }} --head ${{ github.event.pull_request.head.sha }}

  deploy:
    needs: detect
    if: needs.detect.outputs.has_projects == 'true' && secrets.CLASP_CREDENTIALS_JSON != '' && secrets.CLASP_PROJECTS_JSON != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect.outputs.projects) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Configure clasp credentials
        env:
          CLASP_CREDENTIALS_JSON: ${{ secrets.CLASP_CREDENTIALS_JSON }}
        run: |
          mkdir -p "$HOME"
          printf '%s' "$CLASP_CREDENTIALS_JSON" > "$HOME/.clasprc.json"

      - name: Deploy affected project
        env:
          CLASP_PROJECTS_JSON: ${{ secrets.CLASP_PROJECTS_JSON }}
        run: node scripts/deploy-project.mjs --project ${{ matrix.project }}
